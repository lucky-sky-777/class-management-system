# SPRING - APPLICATION
spring.application.name=backend

# SPRING - DATASOURCE
spring.datasource.url=${SUPABASE_URL}
spring.datasource.username=${SUPABASE_USERNAME}
spring.datasource.password=${SUPABASE_PASSWORD}

spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000

# SPRING - JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

#SPRING - SERVLET
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# SERVER
server.address=0.0.0.0
server.port=${PORT:8080}

# ACTUATOR
management.endpoints.web.exposure.include=mappings

# JWT
jwt.signer-key=${JWT_SIGNER_KEY}

# MEZON
mezon.client-id=${MEZON_CLIENT_ID}
mezon.client-secret=${MEZON_CLIENT_SECRET}
mezon.redirect-uri=${MEZON_REDIRECT_URI}

mezon.auth-url=${MEZON_AUTH_URL}
mezon.token-url=${MEZON_TOKEN_URL}
mezon.user-info-url=${MEZON_USER_INFO_URL}

# GOOGLE
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
#google.redirect-uri=${GOOGLE_REDIRECT_URI}
google.redirect-uri=http://localhost:8080/api/auth/google/callback

google.auth-url=${GOOGLE_AUTH_URL}
google.token-url=${GOOGLE_TOKEN_URL}
google.user-info-url=${GOOGLE_USER_INFO_URL}